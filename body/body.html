<div class="onglet-content">
    <h2>Body</h2>
    <form id="bodyForm">
        <label for="date-body">Date :</label>
        <input type="date" id="date-body" required>

        <label for="poids">Poids (kg) :</label>
        <input type="number" id="poids" step="0.1" min="0" required>

        <label for="tour-taille">Tour de taille (cm) :</label>
        <input type="number" id="tour-taille" step="0.1" min="0">

        <label for="taille">Taille (cm) :</label>
        <input type="number" id="taille" step="0.1" min="0" required>

        <label for="age">Date de naissance :</label>
        <input type="date" id="age" required>

        <button type="submit">Enregistrer</button>
    </form>

    <div id="bodyFeedback"></div>
    <div id="bodyDataDisplay"></div>

    <table id="bodyHistoryTable" style="display:none">
        <thead>
            <tr>
                <th>Date</th>
                <th>Poids (kg)</th>
                <th>Tour de taille (cm)</th>
                <th>IMC</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
