<div class="onglet-content">
    <h2>Body</h2>
    <form id="bodyForm">

        <input type="number" id="poids" value="111" required>

        <label for="tour-taille">Tour de taille (cm) :</label>
        <input type="number" id="tour-taille" value="112" required>

        <label for="taille">Taille (cm) :</label>
