<div class="onglet-content">
    <h2>Sommeil</h2>
    <form id="sommeilForm">
        <label for="date-sommeil">Date :</label>
        <input type="date" id="date-sommeil" required>

        <label for="apnee">Apnée (min) :</label>
        <input type="number" id="apnee">

        <label for="rem">REM (min) :</label>
        <input type="number" id="rem">

        <label for="profond">Sommeil profond (min) :</label>
        <input type="number" id="profond">

        <label for="leger">Sommeil léger (min) :</label>
        <input type="number" id="leger">

        <label for="temps-total">Temps total (min) :</label>
        <input type="number" id="temps-total">

        <label for="bpm">BPM :</label>
        <input type="number" id="bpm">

        <label for="oxygen">Oxygène sanguin (%) :</label>
        <input type="number" id="oxygen">

        <button type="submit">Enregistrer</button>
    </form>
    <div id="sommeilFeedback"></div>
    <table id="sommeilTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Apnée (min)</th>
                <th>REM (min)</th>
                <th>Profond (min)</th>
                <th>Léger (min)</th>
                <th>Temps total (min)</th>
                <th>BPM</th>
                <th>Oxygène (%)</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
