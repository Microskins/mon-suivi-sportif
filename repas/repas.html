<div class="onglet-content">
    <h2>Repas</h2>
    <form id="repasForm">
        <label for="date-repas">Date :</label>
        <input type="date" id="date-repas" required>

        <label for="type-repas">Type :</label>
        <select id="type-repas">
            <option value="petit-dejeuner">Petit-déjeuner</option>
            <option value="dejeuner">Déjeuner</option>
            <option value="diner">Dîner</option>
            <option value="collation">Collation</option>
        </select>

        <label for="aliments">Aliments :</label>
        <textarea id="aliments" rows="2" placeholder="Ex: Riz 150g, Poulet 200g..."></textarea>

        <label for="calories">Calories (kcal) :</label>
        <input type="number" id="calories" min="0" placeholder="0">

        <label for="proteines">Protéines (g) :</label>
        <input type="number" id="proteines" min="0" placeholder="0">

        <label for="glucides">Glucides (g) :</label>
        <input type="number" id="glucides" min="0" placeholder="0">

        <label for="lipides">Lipides (g) :</label>
        <input type="number" id="lipides" min="0" placeholder="0">

        <button type="submit">Enregistrer</button>
    </form>

    <div id="repasFeedback"></div>

    <div id="repasTotaux" class="totaux-bar" style="display:none">
        <span id="totalKcal">0 kcal</span>
        <span id="totalProt">0 g prot.</span>
        <span id="totalGluc">0 g gluc.</span>
        <span id="totalLip">0 g lip.</span>
    </div>

    <table id="repasTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Aliments</th>
                <th>Kcal</th>
                <th>Prot. (g)</th>
                <th>Gluc. (g)</th>
                <th>Lip. (g)</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
